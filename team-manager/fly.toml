app = "cougars-hockey"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  # AIRTABLE_API and ADMIN_PASSWORD are set as Fly secrets:
  # fly secrets set AIRTABLE_API=... ADMIN_PASSWORD=...
